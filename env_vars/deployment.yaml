apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-config-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-config
  template:
    metadata:
      labels:
        app: my-config
    spec:
      containers:
        - name: app-config
          image: kubedevio/app-variaveis-ambiente:v1
          ports:
            - containerPort: 3000
          env:
            - name: APP_NAME
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: APP_NAME_CONFIG
            - name: APP_VERSION
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: APP_VERSION_CONFIG
            - name: APP_AUTHOR
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: APP_AUTHOR_CONFIG
---
apiVersion: v1
kind: Service
metadata:
  name: my-config-service
spec:
  selector:
    app: my-config
  type: NodePort
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
      name: http
      nodePort: 30000