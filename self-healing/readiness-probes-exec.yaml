apiVersion: apps/v1
kind: Deployment
metadata:
  name: busybox-pod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: busybox-pod
  template:
    metadata:
      labels:
        app: busybox-pod
    spec:
      containers:
      - name: busybox-pod
        image: busybox
        command:
          - /bin/sh
          - -c
        args:
          - touch /tmp/ready; sleep 30; rm -f /tmp/ready; sleep 60;
        ports:
        - containerPort: 3000
        readinessProbe:
          exec:
            command:
              - cat
              - /tmp/ready
          initialDelaySeconds: 3
          periodSeconds: 4
          failureThreshold: 1
          successThreshold: 2
          timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: busybox-pod
spec:
  selector:
    app: busybox-pod
  type: NodePort
  ports:
  - port: 80
    targetPort: 3000
    name: http
    protocol: TCP
    nodePort: 30000