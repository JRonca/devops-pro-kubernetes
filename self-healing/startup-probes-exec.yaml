apiVersion: apps/v1
kind: Deployment
metadata:
  name: busybox-pod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: busybox-pod
  template:
    metadata:
      labels:
        app: busybox-pod
    spec:
      containers:
      - name: busybox-pod
        image: busybox
        command:
          - /bin/sh
          - -c
        args:
          - sleep 60; touch /tmp/health; sleep 600;
        ports:
        - containerPort: 3000
        startupProbe:
          exec:
            command:
              - cat
              - /tmp/health
          failureThreshold: 30 # => 300s 5 minutos
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: busybox-pod
spec:
  selector:
    app: busybox-pod
  type: NodePort
  ports:
  - port: 80
    targetPort: 3000
    name: http
    protocol: TCP
    nodePort: 30000